name: Build Android APK

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        run: npm ci

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Install local Capacitor packages
        run: npm install @capacitor/core @capacitor/android @capacitor/cli --save

      - name: Capacitor sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate keystore (for debug/testing)
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            keytool -genkey -v \
              -keystore android/app/exam-designer.keystore \
              -alias exam-designer \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android123 \
              -keypass android123 \
              -dname "CN=ExamDesigner, OU=Education, O=Education, L=Tehran, S=Tehran, C=IR"

            echo "DEBUG_KEYSTORE=true" >> $GITHUB_ENV
          fi

      - name: Decode keystore (production)
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/exam-designer.keystore

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_FILE: exam-designer.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'exam-designer' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android123' }}
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: exam-designer-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exam-designer-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: exam-designer-debug
          path: ./apks/debug/

      - name: Download Release APK
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: exam-designer-release
          path: ./apks/release/

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION-$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "طراح سوالات v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 📱 طراح سوالات پیشرفته - آموزش و پرورش

            ### ✨ ویژگی‌ها:
            - طراحی انواع سوال (صحیح/غلط، جاخالی، جورکردنی، تستی، پاسخ کوتاه، تشریحی)
            - سربرگ کامل آزمون با اطلاعات مدرسه
            - بارم‌بندی از ۰.۲۵ تا ۱۰ نمره
            - خروجی PDF و Word
            - ذخیره و بارگذاری آزمون‌ها

            ### 📥 دانلود:
            - فایل Debug APK برای تست
            - فایل Release APK برای استفاده نهایی

            ### 📋 نیازمندی‌ها:
            - اندروید ۶.۰ (API 23) به بالا

            ---

            *ساخته شده با React + Capacitor*

          files: |
            ./apks/debug/*.apk
            ./apks/release/*.apk

          draft: false
          prerelease: false

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
