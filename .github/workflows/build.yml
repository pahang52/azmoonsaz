name: Build Android APK

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android @capacitor/cli

      - name: Sync Capacitor
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -alias exam-designer \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore android/app/exam-designer.keystore \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=ExamDesigner, OU=Education, O=Education, L=Tehran, ST=Tehran, C=IR"

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_FILE: exam-designer.keystore
          KEYSTORE_PASSWORD: android123
          KEY_ALIAS: exam-designer
          KEY_PASSWORD: android123
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: exam-designer-debug
          path: android/app/build/outputs/apk/debug/*.apk

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: exam-designer-release
          path: android/app/build/outputs/apk/release/*.apk

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: exam-designer-debug
          path: apks/debug

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: exam-designer-release
          path: apks/release

      - name: Get Version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION-$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: طراح سوالات v${{ steps.version.outputs.VERSION }}
          files: |
            apks/debug/*.apk
            apks/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
